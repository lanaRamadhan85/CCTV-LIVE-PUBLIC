      function openFullscreen(streamId, title) {
        const modal = document.getElementById('fullscreenModal');
        const modalTitle = document.getElementById('modalTitle');
        const fullscreenVideo = document.getElementById('fullscreenVideo');
        
        // Cari URL stream
        const stream = cctvStreams.find(s => s.id === streamId);
        if (!stream) return;

        // Perbarui judul
        modalTitle.textContent = 'Lihat CCTV ' + title;

        // Cegah scroll body
        document.body.style.overflow = 'hidden';

        // Tampilkan modal
        modal.classList.remove('hidden');

        // Bersihkan instance HLS sebelumnya
        if (fullscreenHls) {
          fullscreenHls.destroy();
          fullscreenHls = null;
        }

        // Muat stream video
        const hlsUrl = stream.url.endsWith('.m3u8') ? stream.url : stream.url + '/playlist.m3u8';
        
        if (Hls.isSupported()) {
          fullscreenHls = new Hls({
            enableWorker: true,
            lowLatencyMode: true
          });
          fullscreenHls.loadSource(hlsUrl);
          fullscreenHls.attachMedia(fullscreenVideo);
          fullscreenHls.on(Hls.Events.MANIFEST_PARSED, function() {
            fullscreenVideo.play();
          });
          fullscreenHls.on(Hls.Events.ERROR, function(event, data) {
            if (data.fatal && data.type === Hls.ErrorTypes.NETWORK_ERROR) {
              const altUrl = stream.url + '/index.m3u8';
              fullscreenHls.loadSource(altUrl);
            }
          });
        } else if (fullscreenVideo.canPlayType('application/vnd.apple.mpegurl')) {
          fullscreenVideo.src = hlsUrl;
          fullscreenVideo.play();
        }
      }

      // Fungsi untuk menutup modal fullscreen
      function closeFullscreen() {
        const modal = document.getElementById('fullscreenModal');
        const fullscreenVideo = document.getElementById('fullscreenVideo');
        
        // Jeda video
        fullscreenVideo.pause();
        fullscreenVideo.src = '';

        // Bersihkan instance HLS
        if (fullscreenHls) {
          fullscreenHls.destroy();
          fullscreenHls = null;
        }

        // Kembalikan scroll body
        document.body.style.overflow = 'auto';

        // Sembunyikan modal
        modal.classList.add('hidden');
      }

      // Event tombol tutup modal
      document.getElementById('closeModal').addEventListener('click', closeFullscreen);

      // Tutup modal dengan tombol Escape
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          closeFullscreen();
        }
      });
    </script>
  </body>
</html>
